<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Wrong Biology Interface</title>
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
<style>body{margin:0;background:#050008;color:white;font-family:monospace}.hud{position:fixed;left:12px;top:12px;background:rgba(0,0,0,.65);padding:10px;border-radius:8px}</style>
</head>
<body>
<div class="hud"><b>Wrong Biology Interface</b><br>fake grown UI panels from quantized morphogenesis<br>[r] redraw [s] save</div>
<script>
function setup(){createCanvas(900,900);pixelDensity(1);noiseDetail(5,.5);drawIt();}
function q(v,levels){return floor(v*levels)/levels;}
function drawIt(){
  background(5,0,8);
  noStroke();
  for(let y=0;y<height;y+=6)for(let x=0;x<width;x+=6){
    let u=x/width,v=y/height;
    let panel=sin(floor(u*7)*1.7)+cos(floor(v*7)*2.1);
    let n=noise(u*8+panel,v*8-panel);
    let val=q(n+.15*sin(u*40)+.1*cos(v*35),5);
    fill(255*val,90+155*abs(sin(val*PI)),255*(1-val));
    rect(x,y,6,6);
  }
  stroke(255,210); strokeWeight(3); noFill();
  for(let i=0;i<42;i++){
    let x=random(width), y=random(height), w=random(60,220), h=random(30,140);
    rect(x,y,w,h, random(4,30));
    if(random()<.6) ellipse(x+w*.5,y+h*.5,min(w,h)*.45);
  }
  stroke(0,255,210,180); strokeWeight(1);
  for(let i=0;i<160;i++){
    let x=random(width),y=random(height);
    line(x,y,x+random(-80,80),y+random(-80,80));
  }
}
function draw(){}
function keyPressed(){if(key==='r'||key==='R')drawIt(); if(key==='s'||key==='S')saveCanvas('wrong_biology_interface','png');}
</script>
</body>
</html>
